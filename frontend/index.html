<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Vault Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sneaker Vault Pro</h1>
            <div class="stats-box">
                Total Pairs: <span id="total-count">0</span> | 
                Total Value: $<span id="total-value">0</span> |
                Page Size: <span id="current-page-size">10</span>
            </div>
        </header>

        <section class="controls-section">
            <input type="text" id="search-input" placeholder="Search brand or model..." onkeyup="handleSearch()">
            
            <select id="sort-select" onchange="handleSort()">
                <option value="id">Sort by: Newest</option>
                <option value="price_asc">Price: Low to High</option>
                <option value="price_desc">Price: High to Low</option>
                <option value="brand">Brand: A-Z</option>
            </select>
            
            <select id="page-size-select" onchange="handlePageSize()">
                <option value="5">5 per page</option>
                <option value="10">10 per page</option>
                <option value="20">20 per page</option>
                <option value="50">50 per page</option>
            </select>
        </section>

        <section class="form-section">
            <h3>Manage Inventory</h3>
            <form id="item-form">
                <input type="hidden" id="item-id">
                <div class="form-grid">
                    <input type="text" id="brand" placeholder="Brand" required>
                    <input type="text" id="model" placeholder="Model" required>
                    <input type="number" id="size" step="0.5" placeholder="Size" required>
                    <input type="number" id="value" placeholder="Value ($)" required>
                    <input type="url" id="image-url" placeholder="Image URL (optional)">
                </div>
                <button type="submit" id="save-btn">Add Sneaker</button>
                <button type="button" id="cancel-btn" onclick="resetForm()" style="display:none; background:#6c757d;">Cancel</button>
            </form>
        </section>

        <section id="sneaker-grid" class="grid-container">
            </section>

        <div class="pagination-controls">
            <button id="prev-btn" onclick="changePage(-1)">Previous</button>
            <span id="page-indicator">Page 1</span>
            <button id="next-btn" onclick="changePage(1)">Next</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
